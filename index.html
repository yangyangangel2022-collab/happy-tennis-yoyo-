<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY TENNIS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0c0c0c; --bg2:#141414; --card:#181818; --card2:#202020;
  --border:#2a2a2a; --border2:#333;
  --green:#39e75f; --green2:#22c445; --green-dim:rgba(57,231,95,0.10); --green-glow:rgba(57,231,95,0.25);
  --red:#ff3b3b; --yellow:#f5c542; --orange:#ff8c42; --blue:#4a9eff;
  --text:#f0f0f0; --muted:#666; --dim:#333;
}
html { scroll-behavior:smooth; }
body { background:var(--bg); color:var(--text); font-family:'Noto Sans SC',sans-serif; min-height:100vh; -webkit-font-smoothing:antialiased; }

/* ── LAYOUT ── */
.wrap { max-width:440px; margin:0 auto; padding-bottom:72px; }

/* ── PAGES ── */
.page { display:none; }
.page.active { display:block; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position:fixed; bottom:0; left:0; right:0; z-index:100;
  background:rgba(14,14,14,0.96); border-top:1px solid var(--border);
  backdrop-filter:blur(12px);
  display:flex; max-width:440px; margin:0 auto;
}
.nav-item {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:10px 4px 12px; cursor:pointer; transition:all .15s;
  border:none; background:transparent; color:var(--muted);
  -webkit-tap-highlight-color:transparent;
}
.nav-item.active { color:var(--green); }
.nav-icon { width:22px; height:22px; margin-bottom:3px; display:flex; align-items:center; justify-content:center; }
.nav-label { font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:2px; }
.nav-badge {
  position:absolute; top:6px; right:calc(50% - 18px);
  background:var(--green); color:#000; font-size:9px; font-weight:900;
  border-radius:10px; padding:1px 5px; font-family:'Bebas Neue',sans-serif;
  letter-spacing:1px; min-width:16px; text-align:center;
}

/* ── HEADER ── */
.header { padding:36px 24px 24px; position:relative; overflow:hidden; border-bottom:1px solid var(--border); }
.header::before { content:''; position:absolute; inset:0; background:linear-gradient(rgba(57,231,95,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(57,231,95,0.04) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }
.header::after { content:''; position:absolute; top:0; left:20%; right:20%; height:1px; background:linear-gradient(90deg,transparent,var(--green),transparent); }
.header-eyebrow { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
.eyebrow-line { width:24px; height:1px; background:var(--green); }
.eyebrow-text { font-size:11px; font-weight:700; letter-spacing:3px; color:var(--green); }
.title-happy { font-family:'Bebas Neue',sans-serif; font-size:14px; letter-spacing:8px; color:var(--muted); display:block; }
.title-tennis { font-family:'Bebas Neue',sans-serif; font-size:64px; line-height:0.85; letter-spacing:-1px; color:var(--text); display:block; }
.title-tennis em { color:var(--green); font-style:normal; }
.header-ball-wrap { position:absolute; right:24px; top:50%; transform:translateY(-50%); }

/* ── SECTION ── */
.section { margin:12px 14px 0; background:var(--card); border-radius:14px; border:1px solid var(--border); overflow:hidden; }
.section-head { padding:12px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; background:var(--card2); }
.step-num { font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:2px; color:var(--green); opacity:.8; white-space:nowrap; }
.section-title { font-size:13px; font-weight:700; letter-spacing:.5px; flex:1; }
.section-note { font-size:11px; color:var(--muted); font-weight:400; }
.section-body { padding:16px 18px; }

/* ── COUNT ── */
.count-row { display:flex; gap:6px; }
.count-btn { flex:1; height:48px; border-radius:8px; border:1px solid var(--border2); background:var(--bg2); color:var(--muted); font-family:'Bebas Neue',sans-serif; font-size:22px; cursor:pointer; transition:all .12s; }
.count-btn.active { background:var(--green); border-color:var(--green); color:#0c0c0c; box-shadow:0 0 16px var(--green-glow); }

/* ── PLAYERS ── */
.players-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }
.player-card { background:var(--bg2); border:1.5px solid var(--border); border-radius:10px; padding:0; display:flex; flex-direction:column; transition:border-color .12s,background .12s; cursor:pointer; overflow:hidden; min-height:68px; -webkit-tap-highlight-color:transparent; }
.player-card.checked { border-color:var(--green); background:rgba(57,231,95,0.05); }
.player-card.guest { border-style:dashed; border-color:var(--border2); }
.player-card.guest.checked { border-color:var(--orange); background:rgba(255,140,66,0.05); }
.player-card.unchecked { opacity:0.4; }
.player-card-top { display:flex; align-items:center; justify-content:space-between; padding:7px 11px 3px; }
.player-letter { font-family:'Bebas Neue',sans-serif; font-size:15px; color:var(--green); line-height:1; }
.player-card.guest .player-letter { color:var(--orange); }
.player-card.unchecked .player-letter { color:var(--muted); }
.check-indicator { width:20px; height:20px; border-radius:5px; border:1.5px solid var(--border2); background:transparent; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; font-weight:900; color:transparent; pointer-events:none; transition:all .12s; }
.player-card.checked .check-indicator { background:var(--green); border-color:var(--green); color:#0c0c0c; }
.player-card.guest.checked .check-indicator { background:var(--orange); border-color:var(--orange); color:#0c0c0c; }
.player-card-input { padding:2px 11px 9px; }
.player-input { width:100%; background:transparent; border:none; outline:none; color:var(--text); font-size:13px; font-weight:700; font-family:'Noto Sans SC',sans-serif; padding:0; }
.player-input::placeholder { color:var(--muted); }

.btn-primary { width:100%; padding:14px; background:var(--green); color:#0c0c0c; font-family:'Bebas Neue',sans-serif; font-size:19px; letter-spacing:4px; border:none; border-radius:8px; cursor:pointer; transition:all .12s; display:flex; align-items:center; justify-content:center; gap:8px; box-shadow:0 4px 20px var(--green-glow); }
.btn-primary:hover { background:#4df570; transform:translateY(-1px); }

/* ── ORDER STRIP ── */
.order-scroll { display:flex; align-items:flex-start; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
.order-scroll::-webkit-scrollbar { display:none; }
.order-item { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
.order-idx { font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:1px; color:var(--muted); margin-bottom:3px; }
.order-chip { padding:6px 13px; border-radius:6px; border:1px solid var(--border); background:var(--bg2); font-size:12px; font-weight:700; white-space:nowrap; color:var(--muted); }
.order-chip.on { border-color:var(--green); color:var(--green); background:var(--green-dim); }
.order-arrow { color:var(--dim); font-size:14px; padding:0 3px; margin-top:18px; flex-shrink:0; }

/* ── MATCH LIST ── */
.match-counter { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.match-counter-text { font-size:12px; color:var(--muted); }
.btn-reset-small { padding:5px 12px; background:transparent; color:var(--muted); font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:2px; border:1px solid var(--border2); border-radius:6px; cursor:pointer; transition:all .12s; }
.btn-reset-small:hover { border-color:var(--red); color:var(--red); }

.all-matches { display:flex; flex-direction:column; gap:8px; }
.match-item { border-radius:12px; border:1px solid var(--border2); background:var(--bg2); overflow:hidden; transition:border-color .2s; }
.match-item.done-left { border-color:rgba(57,231,95,.35); }
.match-item.done-right { border-color:rgba(74,158,255,.35); }

/* collapsed done row */
.match-item.collapsed { cursor:pointer; }
.match-collapsed-row { display:flex; align-items:center; justify-content:space-between; padding:10px 14px; }
.match-collapsed-left { display:flex; align-items:center; gap:10px; }
.match-collapsed-num { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:2px; color:var(--muted); }
.match-collapsed-teams { font-size:12px; font-weight:700; color:var(--text); }
.match-collapsed-result { font-family:'Bebas Neue',sans-serif; font-size:12px; letter-spacing:1px; padding:3px 10px; border-radius:20px; }
.result-left { background:rgba(57,231,95,.12); color:var(--green); border:1px solid rgba(57,231,95,.3); }
.result-right { background:rgba(74,158,255,.12); color:var(--blue); border:1px solid rgba(74,158,255,.3); }

.match-item-head { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; border-bottom:1px solid var(--border); background:var(--card2); }
.match-item-num { font-family:'Bebas Neue',sans-serif; font-size:11px; letter-spacing:2px; color:var(--muted); }
.match-item-badge { font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:1px; padding:3px 10px; border-radius:20px; }
.badge-score { background:var(--green-dim); color:var(--green); border:1px solid rgba(57,231,95,.3); }
.badge-dup { background:rgba(255,140,66,.1); color:var(--orange); border:1px solid rgba(255,140,66,.3); }

/* mini court */
.mini-court { background:#0f2010; border-radius:8px; border:1px solid #1e3d20; overflow:hidden; margin:10px 10px 0; position:relative; }
.mini-court::before { content:''; position:absolute; inset:0; background:linear-gradient(rgba(255,255,255,0.04) 1px,transparent 1px) center/100% 50%, linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px) center/50% 100%; pointer-events:none; }
.mini-court-body { display:grid; grid-template-columns:1fr 6px 1fr; position:relative; z-index:1; }
.team-half { padding:10px 12px; display:flex; flex-direction:column; gap:7px; }
.net-bar { background:repeating-linear-gradient(to bottom,rgba(255,255,255,.55) 0,rgba(255,255,255,.55) 3px,transparent 3px,transparent 7px); position:relative; }
.net-post { position:absolute; left:50%; transform:translateX(-50%); width:10px; height:4px; background:rgba(255,255,255,.4); border-radius:1px; }
.net-post.top { top:0; } .net-post.bot { bottom:0; }
.pcard { background:rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.1); border-radius:7px; padding:7px 10px; text-align:center; position:relative; }
.pcard-dot { position:absolute; top:-5px; left:50%; transform:translateX(-50%); width:8px; height:8px; background:var(--yellow); border-radius:50%; box-shadow:0 0 6px rgba(245,197,66,.6); }
.pcard-name { font-size:12px; font-weight:700; color:#fff; margin-top:1px; }
.pcard.serving { border-color:rgba(245,197,66,.6); background:rgba(245,197,66,.08); }
.pcard-serve-badge { position:absolute; top:-6px; right:4px; font-size:11px; line-height:1; }
.mini-waiting { border-top:1px solid rgba(255,255,255,.06); padding:7px 12px; display:flex; align-items:center; gap:6px; position:relative; z-index:1; }
.w-label { font-size:10px; font-weight:700; letter-spacing:2px; color:rgba(255,255,255,.25); white-space:nowrap; }
.w-pill { padding:2px 8px; border:1px dashed rgba(255,255,255,.15); border-radius:20px; font-size:10px; color:rgba(255,255,255,.3); }
.dup-notice { margin:7px 10px 0; padding:7px 12px; background:rgba(255,140,66,.08); border:1px solid rgba(255,140,66,.25); border-radius:8px; font-size:11px; color:var(--orange); }

/* serve panel */
.match-start-row { padding:10px; }
.btn-start-match { width:100%; padding:11px; background:transparent; color:var(--green); font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px; border:1px solid rgba(57,231,95,.35); border-radius:8px; cursor:pointer; transition:all .15s; }
.btn-start-match:hover { background:var(--green-dim); border-color:var(--green); }
.serve-panel { padding:10px 10px 0; display:none; }
.serve-panel.open { display:block; }
.serve-panel-label { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--muted); margin-bottom:8px; }
.serve-mini-teams { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:8px; }
.serve-mini-btn { padding:10px 8px; border-radius:8px; border:1.5px solid var(--border2); background:var(--bg); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; transition:all .15s; }
.serve-mini-btn:hover { border-color:var(--yellow); }
.serve-mini-btn.selected { border-color:var(--yellow); background:rgba(245,197,66,.08); box-shadow:0 0 10px rgba(245,197,66,.15); }
.serve-mini-ball { font-size:16px; }
.serve-mini-names { font-size:11px; font-weight:700; color:var(--text); text-align:center; line-height:1.4; }
.serve-mini-tag { font-size:10px; color:var(--muted); }
.serve-mini-btn.selected .serve-mini-tag { color:var(--yellow); }
.btn-confirm-serve { width:100%; padding:10px; background:var(--green); color:#0c0c0c; font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:3px; border:none; border-radius:8px; cursor:pointer; margin-bottom:10px; transition:all .12s; }
.btn-confirm-serve:hover { background:#4df570; }

/* win buttons */
.win-row { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:10px; }
.btn-win { padding:11px 8px; border-radius:8px; border:1px solid var(--border2); background:var(--bg); color:var(--text); cursor:pointer; transition:all .12s; display:flex; flex-direction:column; align-items:center; gap:3px; }
.btn-win:hover { border-color:var(--green); background:var(--green-dim); }
.btn-win.disabled { opacity:.3; cursor:default; pointer-events:none; }
.btn-win.winner-left { border-color:var(--green); background:rgba(57,231,95,.12); }
.btn-win.winner-right { border-color:var(--blue); background:rgba(74,158,255,.12); }
.btn-win-label { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:2px; color:var(--green); }
.btn-win.winner-right .btn-win-label { color:var(--blue); }
.btn-win-names { font-size:10px; color:var(--muted); text-align:center; }

/* ── SCOREBOARD ── */
.score-list { display:flex; flex-direction:column; gap:6px; }
.score-row { display:grid; grid-template-columns:36px 1fr 48px; align-items:center; gap:10px; padding:11px 13px; background:var(--bg2); border-radius:10px; border:1px solid var(--border); position:relative; overflow:hidden; }
.score-row::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:0 2px 2px 0; }
.score-row.rank1 { border-color:rgba(57,231,95,.25); background:rgba(57,231,95,.04); }
.score-row.rank1::before { background:var(--green); box-shadow:0 0 8px var(--green-glow); }
.score-row.last { border-color:rgba(255,59,59,.2); background:rgba(255,59,59,.03); }
.score-row.last::before { background:var(--red); }
.score-rank { font-family:'Bebas Neue',sans-serif; font-size:24px; color:var(--dim); text-align:center; line-height:1; }
.score-row.rank1 .score-rank { color:var(--green); }
.score-row.last .score-rank { color:var(--red); }
.score-center { display:flex; flex-direction:column; gap:4px; min-width:0; }
.score-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.score-bar-track { height:2px; background:var(--border2); border-radius:1px; overflow:hidden; }
.score-bar-fill { height:100%; background:var(--green2); border-radius:1px; transition:width .5s ease; }
.score-row.rank1 .score-bar-fill { background:var(--green); }
.score-row.last .score-bar-fill { background:var(--red); }
.score-right { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
.score-pts { font-family:'Bebas Neue',sans-serif; font-size:30px; line-height:1; color:var(--text); }
.score-row.rank1 .score-pts { color:var(--green); }
.score-row.last .score-pts { color:var(--red); }
.coffee-tag { font-size:9px; font-weight:700; color:var(--red); white-space:nowrap; }

.done-banner { padding:20px; background:var(--green-dim); border:1px solid rgba(57,231,95,.3); border-radius:12px; text-align:center; margin-bottom:12px; }
.done-banner h3 { font-family:'Bebas Neue',sans-serif; font-size:26px; letter-spacing:3px; color:var(--green); margin-bottom:4px; }
.done-banner p { font-size:12px; color:var(--muted); }
.btn-reset { width:100%; padding:11px; background:transparent; color:var(--muted); font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:3px; border:1px solid var(--border2); border-radius:8px; cursor:pointer; transition:all .12s; }
.btn-reset:hover { border-color:var(--red); color:var(--red); }

/* ── MODALS ── */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(6px); }
.modal-overlay.hidden { display:none; }

.start-modal { background:var(--card); border:1px solid var(--border2); border-radius:20px; width:100%; max-width:400px; overflow:hidden; animation:fadeIn .3s ease; }
.start-modal-header { padding:22px 22px 14px; border-bottom:1px solid var(--border); text-align:center; position:relative; }
.start-modal-header::before { content:''; position:absolute; top:0; left:20%; right:20%; height:1px; background:linear-gradient(90deg,transparent,var(--green),transparent); }
.start-title { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:4px; color:var(--green); display:block; }
.start-subtitle { font-size:11px; color:var(--muted); margin-top:3px; }
.start-modal-body { padding:18px 22px; }
.start-section-label { font-size:11px; font-weight:700; letter-spacing:2px; color:var(--muted); margin-bottom:8px; }
.modal-order-strip { display:flex; gap:5px; flex-wrap:wrap; margin-bottom:18px; }
.modal-order-chip { display:flex; align-items:center; gap:4px; padding:5px 10px; border-radius:7px; border:1px solid var(--border2); background:var(--bg2); font-size:11px; font-weight:700; color:var(--muted); }
.modal-order-chip.top4 { border-color:var(--green); color:var(--green); background:var(--green-dim); }
.modal-order-chip .chip-num { font-family:'Bebas Neue',sans-serif; font-size:13px; opacity:.5; }
.serve-label { font-size:13px; font-weight:700; margin-bottom:10px; color:var(--text); }
.serve-teams { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:18px; }
.serve-btn { padding:13px 8px; border-radius:10px; border:2px solid var(--border2); background:var(--bg2); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px; transition:all .15s; }
.serve-btn:hover { border-color:var(--yellow); }
.serve-btn.selected { border-color:var(--yellow); background:rgba(245,197,66,.08); box-shadow:0 0 14px rgba(245,197,66,.2); }
.serve-btn-ball { font-size:18px; }
.serve-btn-names { font-size:11px; font-weight:700; color:var(--text); text-align:center; line-height:1.4; }
.serve-btn-tag { font-size:10px; color:var(--muted); }
.serve-btn.selected .serve-btn-tag { color:var(--yellow); }
.btn-start-game { width:100%; padding:15px; background:var(--green); color:#0c0c0c; font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:4px; border:none; border-radius:10px; cursor:pointer; transition:all .12s; box-shadow:0 4px 20px var(--green-glow); }
.btn-start-game:hover { background:#4df570; }
.btn-start-game:disabled { opacity:.4; cursor:default; }

.win-modal { background:var(--card); border-radius:20px; width:100%; max-width:340px; overflow:hidden; animation:popIn .4s cubic-bezier(.34,1.56,.64,1); }
@keyframes popIn { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }
.win-modal-top { padding:32px 22px 24px; text-align:center; position:relative; overflow:hidden; }
.win-modal-bg { position:absolute; inset:0; opacity:.05; font-size:120px; display:flex; align-items:center; justify-content:center; pointer-events:none; }
.win-trophy { font-size:48px; margin-bottom:10px; display:block; }
.win-congrats { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:4px; color:var(--muted); margin-bottom:5px; }
.win-team-name { font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:2px; line-height:1.1; margin-bottom:3px; }
.win-team-name.left { color:var(--green); }
.win-team-name.right { color:var(--blue); }
.win-players { font-size:13px; color:var(--muted); margin-top:5px; }
.win-modal-bottom { padding:14px 22px 22px; border-top:1px solid var(--border); }
.btn-win-close { width:100%; padding:13px; background:transparent; color:var(--text); font-family:'Bebas Neue',sans-serif; font-size:16px; letter-spacing:3px; border:1px solid var(--border2); border-radius:10px; cursor:pointer; transition:all .12s; }
.btn-win-close:hover { border-color:var(--green); color:var(--green); }

.confetti-wrap { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
.confetti-piece { position:absolute; width:7px; height:7px; border-radius:2px; animation:confettiFall linear forwards; }
@keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1;} 100%{transform:translateY(200px) rotate(720deg);opacity:0;} }

@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

<script>
const DEFAULT_PLAYERS = ['球员 A','球员 B','球员 C','球员 D','球员 E','球员 F'];

let state = {
  count: 6,
  names: [...DEFAULT_PLAYERS,'嘉宾 G','嘉宾 H'],
  checked: [true,true,true,true,true,true,false,false],
  started: false,
  order: [],
  schedule: [],
  scores: {},
  results: {},
  serveTeam: null,
  matchServeSide: {}, // per-match serve side chosen
};

/* ── PAGE SWITCH ── */
function switchPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
}

/* ── HELPERS ── */
function pairKey(a,b){ return [a,b].sort().join('|'); }

function buildSchedule(order){
  const n=order.length, totalPairs=(n*(n-1))/2, targetRounds=Math.ceil(totalPairs/2);
  const seen=new Set(), schedule=[];
  for(let r=0;r<targetRounds;r++){
    const start=r%n, four=[0,1,2,3].map(i=>order[(start+i)%n]);
    const waiting=order.filter(p=>!four.includes(p));
    const pairings=[
      {t1:[four[0],four[1]],t2:[four[2],four[3]]},
      {t1:[four[0],four[2]],t2:[four[1],four[3]]},
      {t1:[four[0],four[3]],t2:[four[1],four[2]]},
    ];
    let best=null,bestScore=Infinity;
    for(const p of pairings){
      const d=(seen.has(pairKey(p.t1[0],p.t1[1]))?1:0)+(seen.has(pairKey(p.t2[0],p.t2[1]))?1:0);
      if(d<bestScore){bestScore=d;best=p;}
    }
    const k1=pairKey(best.t1[0],best.t1[1]),k2=pairKey(best.t2[0],best.t2[1]);
    const d1=seen.has(k1),d2=seen.has(k2);
    const dupInfo=[];
    if(d1) dupInfo.push(best.t1.join(' · '));
    if(d2) dupInfo.push(best.t2.join(' · '));
    seen.add(k1);seen.add(k2);
    schedule.push({team1:best.t1,team2:best.t2,waiting,isDup:d1||d2,dupInfo});
  }
  return schedule;
}

/* ── RENDER COUNT ── */
function renderCountButtons(){
  const row=document.getElementById('countRow');
  row.innerHTML='';
  for(let n=4;n<=8;n++){
    const btn=document.createElement('button');
    btn.className='count-btn'+(n===state.count?' active':'');
    btn.textContent=n;
    btn.onclick=()=>{ state.count=n; for(let i=0;i<8;i++) state.checked[i]=i<n; renderCountButtons(); renderPlayers(); };
    row.appendChild(btn);
  }
}

/* ── RENDER PLAYERS ── */
function renderPlayers(){
  while(state.names.length<8) state.names.push('嘉宾 '+'ABCDEFGH'[state.names.length]);
  state.names=state.names.slice(0,8);
  while(state.checked.length<8) state.checked.push(false);
  const grid=document.getElementById('playersGrid');
  grid.innerHTML='';
  const letters='ABCDEFGH';
  for(let i=0;i<8;i++){
    const isGuest=i>=6, isChecked=state.checked[i]===true;
    const div=document.createElement('div');
    div.className='player-card'+(isGuest?' guest':'')+(isChecked?' checked':' unchecked');
    div.dataset.idx=i;
    div.innerHTML=`
      <div class="player-card-top">
        <span class="player-letter">${letters[i]}</span>
        <div class="check-indicator">${isChecked?'✓':''}</div>
      </div>
      <div class="player-card-input">
        <input class="player-input" value="${state.names[i]}" placeholder="输入名字" data-idx="${i}">
      </div>`;
    grid.appendChild(div);
    div.addEventListener('click',e=>{
      if(e.target.classList.contains('player-input')) return;
      state.checked[parseInt(div.dataset.idx)]=!state.checked[parseInt(div.dataset.idx)];
      renderPlayers();
    });
    div.querySelector('.player-input').addEventListener('input',e=>{
      const idx=parseInt(e.target.dataset.idx);
      state.names[idx]=e.target.value||DEFAULT_PLAYERS[idx]||('嘉宾 '+'ABCDEFGH'[idx]);
    });
  }
}

/* ── ORDER STRIP ── */
function renderOrderStrip(order){
  const el=document.getElementById('orderScroll');
  el.innerHTML='';
  order.forEach((name,i)=>{
    const item=document.createElement('div');
    item.className='order-item';
    item.innerHTML=`<div class="order-idx">0${i+1}</div><div class="order-chip ${i<4?'on':''}">${name}</div>`;
    el.appendChild(item);
    if(i<order.length-1){ const a=document.createElement('span'); a.className='order-arrow'; a.textContent='›'; el.appendChild(a); }
  });
}

/* ── MATCH BADGE ── */
function updateMatchBadge(){
  const done=Object.keys(state.results).length;
  const total=state.schedule.length;
  const badge=document.getElementById('matchBadge');
  if(!state.started||total===0){ badge.style.display='none'; return; }
  const remaining=total-done;
  if(remaining>0){ badge.style.display='block'; badge.textContent=remaining; }
  else { badge.style.display='none'; }
}

/* ── ALL MATCHES ── */
function renderAllMatches(){
  const body=document.getElementById('matchBody');
  const schedule=state.schedule, results=state.results;
  if(!schedule||schedule.length===0){
    body.innerHTML='<div style="font-size:12px;color:var(--muted);text-align:center;padding:20px 0">抽签后显示对阵</div>';
    return;
  }
  const doneCnt=Object.keys(results).length, totalCnt=schedule.length, allDone=doneCnt>=totalCnt;
  let html='';

  if(allDone){
    html+=`<div class="done-banner"><h3>🎾 全部完赛！</h3><p>共 ${totalCnt} 局</p></div><button class="btn-reset" onclick="resetGame()">重新开始新一轮</button>`;
  } else {
    html+=`<div class="match-counter"><span class="match-counter-text">待完成 <strong style="color:var(--green);font-family:'Bebas Neue',sans-serif;font-size:17px;">${totalCnt-doneCnt}</strong> / ${totalCnt} 场</span><button class="btn-reset-small" onclick="resetGame()">重置</button></div>`;
  }

  html+=`<div class="all-matches">`;
  schedule.forEach((round,idx)=>{
    const isDone=results[idx]!==undefined, winner=results[idx], isDup=round.isDup;

    if(isDone){
      // COLLAPSED: just one line
      const resClass=winner===0?'match-collapsed-result result-left':'match-collapsed-result result-right';
      const resText=winner===0?'✦ 左队胜':'✦ 右队胜';
      const serve=state.matchServeSide[idx];
      let serveTag='';
      if(serve!==undefined){ const st=serve===0?round.team1:round.team2; serveTag=` <span style="font-size:10px;color:var(--muted)">· 🎾${st[0]}</span>`; }
      html+=`<div class="match-item done-${winner===0?'left':'right'} collapsed" onclick="toggleMatch(${idx})" id="match-${idx}">
        <div class="match-collapsed-row">
          <div class="match-collapsed-left">
            <span class="match-collapsed-num">M${String(idx+1).padStart(2,'0')}</span>
            <span class="match-collapsed-teams">${round.team1.join('·')} vs ${round.team2.join('·')}${serveTag}</span>
          </div>
          <span class="${resClass}">${resText}</span>
        </div>
      </div>`;
    } else {
      // EXPANDED pending match
      function pcardHTML(name,isServing){
        return `<div class="pcard${isServing?' serving':''}"><div class="pcard-dot"></div>${isServing?'<span class="pcard-serve-badge">🎾</span>':''}<div class="pcard-name">${name}</div></div>`;
      }
      const chosenServe=state.matchServeSide[idx];
      const serve0=chosenServe===0, serve1=chosenServe===1;
      const badgeHTML=isDup?`<span class="match-item-badge badge-dup">⚠ 不计分</span>`:`<span class="match-item-badge badge-score">✦ 计分局</span>`;

      let actionHTML='';
      if(!state.started){
        actionHTML=''; // demo mode, no buttons
      } else if(chosenServe===undefined){
        // show 开始本场
        actionHTML=`<div class="match-start-row"><button class="btn-start-match" onclick="expandServe(${idx})">▶ &nbsp;开始本场</button></div>
        <div class="serve-panel" id="servepanel-${idx}">
          <div class="serve-panel-label">🎾 随机发球 · 可切换</div>
          <div class="serve-mini-teams">
            <button class="serve-mini-btn" id="smb-${idx}-0" onclick="selectMatchServe(${idx},0)">
              <div class="serve-mini-ball">🎾</div>
              <div class="serve-mini-names">${round.team1[0]}<br>${round.team1[1]}</div>
              <div class="serve-mini-tag">左队发球</div>
            </button>
            <button class="serve-mini-btn" id="smb-${idx}-1" onclick="selectMatchServe(${idx},1)">
              <div class="serve-mini-ball">🎾</div>
              <div class="serve-mini-names">${round.team2[0]}<br>${round.team2[1]}</div>
              <div class="serve-mini-tag">右队发球</div>
            </button>
          </div>
          <button class="btn-confirm-serve" id="csb-${idx}" onclick="confirmMatchServe(${idx})">确认发球，开始记分</button>
        </div>`;
      } else {
        // serve confirmed, show win buttons
        actionHTML=`<div class="win-row">
          <button class="btn-win" onclick="recordWin(${idx},0)"><div class="btn-win-label">🏆 左队赢</div><div class="btn-win-names">${round.team1[0]} · ${round.team1[1]}</div></button>
          <button class="btn-win" onclick="recordWin(${idx},1)"><div class="btn-win-label">🏆 右队赢</div><div class="btn-win-names">${round.team2[0]} · ${round.team2[1]}</div></button>
        </div>`;
      }

      html+=`<div class="match-item" id="match-${idx}">
        <div class="match-item-head"><span class="match-item-num">MATCH ${String(idx+1).padStart(2,'0')}</span>${badgeHTML}</div>
        <div class="mini-court">
          <div class="mini-court-body">
            <div class="team-half">${pcardHTML(round.team1[0],serve0)}${pcardHTML(round.team1[1],false)}</div>
            <div class="net-bar"><div class="net-post top"></div><div class="net-post bot"></div></div>
            <div class="team-half">${pcardHTML(round.team2[0],serve1)}${pcardHTML(round.team2[1],false)}</div>
          </div>
          ${round.waiting.length?`<div class="mini-waiting"><span class="w-label">等待</span>${round.waiting.map(w=>`<div class="w-pill">${w}</div>`).join('')}</div>`:''}
        </div>
        ${isDup?`<div class="dup-notice">⚠️ 重复搭档：${round.dupInfo.join('、')} — 本局不计分</div>`:''}
        ${actionHTML}
      </div>`;
    }
  });
  html+=`</div>`;
  body.innerHTML=html;
}

/* ── EXPAND SERVE ── */
function expandServe(idx){
  const panel=document.getElementById('servepanel-'+idx);
  const startRow=document.querySelector('#match-'+idx+' .match-start-row');
  if(!panel) return;
  panel.classList.add('open');
  if(startRow) startRow.style.display='none';
  // random pre-select
  const rand=Math.random()<0.5?0:1;
  selectMatchServe(idx, rand);
}

function selectMatchServe(idx, side){
  document.querySelectorAll('#smb-'+idx+'-0, #smb-'+idx+'-1').forEach(b=>b.classList.remove('selected'));
  const btn=document.getElementById('smb-'+idx+'-'+side);
  if(btn) btn.classList.add('selected');
  // store temp selection
  document.getElementById('servepanel-'+idx).dataset.tempServe=side;
}

function confirmMatchServe(idx){
  const panel=document.getElementById('servepanel-'+idx);
  const side=parseInt(panel.dataset.tempServe);
  state.matchServeSide[idx]=side;
  renderAllMatches();
  renderScoreUI();
}

/* ── RECORD WIN ── */
function recordWin(roundIdx, teamIdx){
  if(state.results[roundIdx]!==undefined) return;
  const round=state.schedule[roundIdx];
  state.results[roundIdx]=teamIdx;
  if(!round.isDup){
    (teamIdx===0?round.team1:round.team2).forEach(p=>{ state.scores[p]=(state.scores[p]||0)+1; });
  }
  renderAllMatches();
  renderScoreUI();
  updateMatchBadge();
  showWinModal(teamIdx, teamIdx===0?round.team1:round.team2);
}

/* ── TOGGLE COLLAPSED ── */
function toggleMatch(idx){
  // tapping a done match does nothing for now (could expand for details)
}

/* ── SCORE UI ── */
function renderScoreUI(){
  const names=state.names.filter((_,i)=>state.checked[i]===true);
  const scores=state.scores;
  const hasScores=names.some(p=>(scores[p]||0)>0);
  const sorted=hasScores?[...names].sort((a,b)=>(scores[b]||0)-(scores[a]||0)):[...names];
  const maxScore=Math.max(...sorted.map(p=>scores[p]||0),1);
  const el=document.getElementById('scoreList');
  el.innerHTML='';
  sorted.forEach((name,i)=>{
    const pts=scores[name]||0, isFirst=i===0&&hasScores, isLast=i===sorted.length-1;
    const row=document.createElement('div');
    row.className='score-row'+(isFirst?' rank1':'')+(isLast?' last':'');
    row.innerHTML=`
      <div class="score-rank">${i+1}</div>
      <div class="score-center">
        <div class="score-name">${name}${isFirst&&pts>0?' 🏅':''}</div>
        <div class="score-bar-track"><div class="score-bar-fill" style="width:${hasScores?Math.round((pts/maxScore)*100):0}%"></div></div>
      </div>
      <div class="score-right">
        <div class="score-pts">${pts}</div>
        ${isLast?'<div class="coffee-tag">☕ 买咖啡</div>':''}
      </div>`;
    el.appendChild(row);
  });
}

/* ── DRAW ── */
document.getElementById('drawBtn').addEventListener('click',()=>{
  const names=state.names.filter((_,i)=>state.checked[i]===true);
  if(names.length<4){ alert('至少需要勾选4位球员！'); return; }
  const shuffled=[...names].sort(()=>Math.random()-.5);
  state.order=shuffled; state.schedule=buildSchedule(shuffled);
  state.results={}; state.scores={}; state.started=false; state.serveTeam=null; state.matchServeSide={};
  names.forEach(n=>state.scores[n]=0);
  document.getElementById('drawBtn').classList.add('shaking');
  setTimeout(()=>document.getElementById('drawBtn').classList.remove('shaking'),400);
  renderOrderStrip(state.order);
  openStartModal(shuffled, state.schedule[0]);
});

/* ── START MODAL ── */
function openStartModal(order, firstRound){
  const strip=document.getElementById('modalOrderStrip');
  strip.innerHTML='';
  order.forEach((name,i)=>{
    const chip=document.createElement('div');
    chip.className='modal-order-chip'+(i<4?' top4':'');
    chip.innerHTML=`<span class="chip-num">${i+1}</span>${name}`;
    strip.appendChild(chip);
  });
  const serveEl=document.getElementById('serveTeams');
  serveEl.innerHTML='';
  if(firstRound){
    [0,1].forEach(side=>{
      const team=side===0?firstRound.team1:firstRound.team2;
      const btn=document.createElement('button');
      btn.className='serve-btn';
      btn.innerHTML=`<div class="serve-btn-ball">🎾</div><div class="serve-btn-names">${team[0]}<br>${team[1]}</div><div class="serve-btn-tag">${side===0?'左队':'右队'} 发球</div>`;
      btn.onclick=()=>{ state.serveTeam=side; document.querySelectorAll('.serve-btn').forEach(b=>b.classList.remove('selected')); btn.classList.add('selected'); document.getElementById('btnStartGame').disabled=false; };
      serveEl.appendChild(btn);
    });
    // random pre-select
    const rand=Math.random()<0.5?0:1;
    state.serveTeam=rand;
    serveEl.children[rand].classList.add('selected');
    document.getElementById('btnStartGame').disabled=false;
  }
  document.getElementById('startOverlay').classList.remove('hidden');
}

document.getElementById('btnStartGame').addEventListener('click',()=>{
  document.getElementById('startOverlay').classList.add('hidden');
  state.started=true;
  // first match serve from modal
  if(state.serveTeam!==null) state.matchServeSide[0]=state.serveTeam;
  renderAllMatches();
  renderScoreUI();
  updateMatchBadge();
  switchPage('match');
});

/* ── WIN MODAL ── */
function showWinModal(side, players){
  document.getElementById('winTeamName').textContent=side===0?'左队胜利！':'右队胜利！';
  document.getElementById('winTeamName').className='win-team-name '+(side===0?'left':'right');
  document.getElementById('winPlayers').textContent=players.join(' · ');
  const wrap=document.getElementById('confettiWrap'); wrap.innerHTML='';
  const colors=['#39e75f','#f5c542','#ff8c42','#4a9eff','#ff3b3b','#fff'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.cssText=`left:${Math.random()*100}%;top:${-10-Math.random()*20}px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${5+Math.random()*5}px;height:${5+Math.random()*5}px;animation-duration:${0.8+Math.random()*0.8}s;animation-delay:${Math.random()*0.3}s;border-radius:${Math.random()>.5?'50%':'2px'};`;
    wrap.appendChild(p);
  }
  document.getElementById('winOverlay').classList.remove('hidden');
}
function closeWinModal(){ document.getElementById('winOverlay').classList.add('hidden'); }

/* ── RESET ── */
function resetGame(){
  state.started=false; state.order=[]; state.schedule=[]; state.results={}; state.scores={}; state.serveTeam=null; state.matchServeSide={};
  renderAllMatches(); renderScoreUI(); updateMatchBadge();
  switchPage('setup');
}

/* ── INIT ── */
renderCountButtons();
renderPlayers();
renderScoreUI();
renderAllMatches();
</script>
